<div class="popup" [class.popup--success]="variant() === 'success'" [class.popup--warning]="variant() === 'warning'" [class.popup--danger]="variant() === 'danger'">
  <div class="popup__header">
    <div class="popup__icon" aria-hidden="true">
      <mat-icon>{{ icon() }}</mat-icon>
    </div>

    @if (showClose()) {
      <button type="button" mat-icon-button class="popup__close" aria-label="Close dialog" (click)="close()">
        <mat-icon>close</mat-icon>
      </button>
    }
  </div>

  <div class="popup__body">
    <h2 class="popup__title">{{ data.title }}</h2>
    <p class="popup__message">{{ data.message }}</p>
  </div>

  <div class="popup__actions">
    @if (showCancel()) {
      <button type="button" mat-stroked-button class="app-btn app-btn--cancel cancel-btn" (click)="close()">
        {{ cancelLabel() }}
      </button>
    }

    <button type="button" mat-raised-button class="app-btn app-btn--submit submit-btn" (click)="confirm()">
      {{ confirmLabel() }}
    </button>
  </div>
</div>
